    .float{animation:float 2.8s ease-in-out infinite;display:inline-block;}
    h1{font-family:'Fredoka One',cursive;font-size:46px;background:linear-gradient(135deg,#6c63ff,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}
    h2{font-family:'Fredoka One',cursive;font-size:22px;color:#b8b0d8;letter-spacing:3px;}
    .unit-card{border-radius:20px;padding:16px;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;align-items:center;gap:14px;width:100%;border:2px solid rgba(0,0,0,0.08);animation:slideUp .3s ease both;margin-bottom:10px;}
    .unit-card:hover{transform:translateY(-4px) scale(1.02);}
    .unit-card:active{transform:scale(0.97);}
    .unit-label{font-family:'Fredoka One',cursive;font-size:17px;line-height:1.2;}
    .unit-sub{font-size:13px;color:#888;margin-top:2px;}
    .start-tag{font-family:'Fredoka One',cursive;font-size:13px;color:#fff;border-radius:10px;padding:4px 12px;white-space:nowrap;}
    .card{border-radius:28px;padding:28px 36px;width:100%;max-width:440px;text-align:center;animation:popIn .4s ease;margin-bottom:20px;}
    .card-zh{font-family:'Fredoka One',cursive;font-size:36px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.18);line-height:1.1;}
    .card-sub{font-size:12px;color:rgba(255,255,255,0.75);margin-top:6px;font-weight:700;}
    .speak-btn{font-family:'Fredoka One',cursive;border:none;border-radius:18px;padding:13px 26px;cursor:pointer;font-size:17px;display:flex;align-items:center;gap:8px;transition:transform .15s,box-shadow .15s;margin-bottom:24px;}
    .speak-btn:hover{transform:scale(1.06);}
    .pulsing{animation:pulse .6s ease-in-out infinite;}
    .boxes{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:440px;margin-bottom:12px;}
    .letter-box{width:50px;height:58px;border-radius:14px;font-family:'Fredoka One',cursive;font-size:24px;text-align:center;border:3px solid #d8d8f0;outline:none;background:#fff;color:#333;transition:border-color .2s,background .2s,transform .15s;caret-color:transparent;text-transform:uppercase;}
    .letter-box:focus{border-color:#6c63ff;background:#f8f7ff;transform:scale(1.1);}
    .letter-box.correct{background:#d5f5e3;border-color:#27ae60;color:#1a7a40;animation:correctPop .3s ease;}
    .letter-box.shake{animation:shake .45s ease;background:#fde8e8;border-color:#e74c3c;}
    .hint{font-size:13px;color:#b0b8d0;font-weight:700;}
    .stars-hint{font-size:13px;color:#c0c8d8;margin-top:8px;}
    .word-done{font-family:'Fredoka One',cursive;font-size:26px;margin-top:16px;animation:popIn .3s ease;}
    .progress-bar-bg{width:100%;max-width:440px;height:9px;background:#eee;border-radius:8px;margin-bottom:24px;overflow:hidden;}
    .progress-bar{height:100%;border-radius:8px;transition:width .5s ease;}
    .topbar{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:14px;}
    .nbtn{font-family:'Fredoka One',cursive;font-size:16px;border:none;border-radius:14px;padding:10px 22px;cursor:pointer;transition:transform .15s;}
    .nbtn:hover{transform:scale(1.05);}
    .result-box{border-radius:24px;padding:20px 32px;margin:16px 0;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:440px;}
    .result-score{font-family:'Fredoka One',cursive;font-size:52px;}
    .confetti-container{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
    .confetti-piece{position:absolute;top:-20px;border-radius:3px;}

  25:{label:"Adjectives 1",emoji:"🌈",color:"#C0392B",bg:"#FDEDEC"},
  26:{label:"Adjectives 2",emoji:"🎨",color:"#884EA0",bg:"#F5EEF8"},
  27:{label:"Adverbs",emoji:"💨",color:"#1A5276",bg:"#EBF5FB"},
  28:{label:"Prepositions",emoji:"📍",color:"#117A65",bg:"#E8F8F5"},
  29:{label:"Pronouns 1",emoji:"👤",color:"#6E2F8E",bg:"#F5EEF8"},
  30:{label:"Pronouns 2",emoji:"👥",color:"#1F618D",bg:"#EBF5FB"},
  31:{label:"Verbs 1",emoji:"🏃",color:"#1E8449",bg:"#EAFAF1"},
  32:{label:"Verbs 2",emoji:"✍️",color:"#2471A3",bg:"#EBF5FB"},
  33:{label:"Verbs 3",emoji:"🎵",color:"#B7950B",bg:"#FEFDE7"},
  34:{label:"Verbs 4",emoji:"💪",color:"#A04000",bg:"#FEF5E7"},
  35:{label:"Verbs 5",emoji:"🌟",color:"#7D6608",bg:"#FEFDE7"},
  36:{label:"Modals & Questions",emoji:"❓",color:"#4A235A",bg:"#F5EEF8"},
  37:{label:"Weather & Days",emoji:"🌤️",color:"#0984E3",bg:"#EBF5FB"},
};
const PAGES = [...new Set(ALL_WORDS.map(w=>w.p))].sort((a,b)=>a-b);

// ══ 音效 ══
let audioCtx = null;
function getCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playSuccess(){
  const c=getCtx();
  [523,659,784].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="sine";
    const t=c.currentTime+i*0.11;
    g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.start(t);o.stop(t+0.22);
  });
}
function playError(){
  const c=getCtx(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=160;o.type="sawtooth";
  g.gain.setValueAtTime(0.28,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.28);
  o.start();o.stop(c.currentTime+0.28);
}
function playComplete(){
  const c=getCtx();
  [523,587,659,698,784,880].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=f;
    const t=c.currentTime+i*0.09;
    g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
    o.start(t);o.stop(t+0.28);
  });
}
function speakWord(w){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);
  u.lang="en-US";u.rate=0.82;u.pitch=1.1;
  window.speechSynthesis.speak(u);
}

// ══ Confetti ══
function spawnConfetti(){
  const c=document.createElement('div');
  c.className='confetti-container';
  const colors=["#FF6B6B","#FFD93D","#55EFC4","#74B9FF","#FD79A8","#A29BFE"];
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    const size=7+Math.random()*8;
    p.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[i%6]};animation:cfFall ${0.9+Math.random()*0.7}s ${Math.random()*0.4}s ease-in forwards;`;
    c.appendChild(p);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),1800);
}

// ══ 狀態 ══
let mode='menu', selPage=null, wordList=[], wordIdx=0;
let letterStates=[], mistakes=0, score=0;

function render(){ document.getElementById('app').innerHTML=''; buildUI(); }

// ══ 主選單 ══
function buildMenu(){
  const app=document.getElementById('app');
  app.innerHTML=`
    <div style="text-align:center;margin-bottom:28px;">
      <div class="float" style="font-size:72px;">🎧</div>
      <h1>聽音拼字</h1>
      <h2>YMCA Starters</h2>
      <div style="font-size:14px;color:#a0a8c0;margin-top:6px;">P17–P36 · 共${ALL_WORDS.length}個單字 · ${PAGES.length}個關卡</div>
    </div>
    <div id="units" style="width:100%;max-width:480px;"></div>
  `;
  const units=document.getElementById('units');
  PAGES.forEach((page,i)=>{
    const m=PAGE_META[page];
    const count=ALL_WORDS.filter(w=>w.p===page).length;
    const card=document.createElement('div');
    card.className='unit-card';
    card.style.cssText=`background:${m.bg};border-color:${m.color}33;box-shadow:0 4px 16px ${m.color}22;animation-delay:${i*0.04}s;`;
    card.innerHTML=`
      <div style="font-size:34px;min-width:42px;text-align:center;">${m.emoji}</div>
      <div style="flex:1;">
        <div class="unit-label" style="color:${m.color};">P${page} · ${m.label}</div>
        <div class="unit-sub">${count} 個單字</div>
      </div>
      <div class="start-tag" style="background:${m.color};">開始 →</div>
    `;
    card.onclick=()=>startUnit(page);
    units.appendChild(card);
  });
}

// ══ 開始關卡 ══
function startUnit(page){
  selPage=page;
  wordList=ALL_WORDS.filter(w=>w.p===page);
  wordIdx=0; score=0; mistakes=0;
  mode='spell';
  buildSpell();
  setTimeout(()=>speakWord(wordList[0].w),400);
}

// ══ 拼字畫面 ══
function buildSpell(){
  const word=wordList[wordIdx];
  const m=PAGE_META[selPage];
  letterStates=word.w.toLowerCase().split('').map(c=>({char:c,status:'empty'}));
  const app=document.getElementById('app');
  const pct=Math.round((wordIdx/wordList.length)*100);
  app.innerHTML=`
    <div class="topbar">
      <button class="nbtn" id="backBtn" style="background:#f0f0ff;color:#6c63ff;">← 回選單</button>
      <div style="font-family:'Fredoka One',cursive;font-size:15px;color:${m.color};">${m.emoji} P${selPage} · ${wordIdx+1}/${wordList.length}</div>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar" style="width:${pct}%;background:linear-gradient(90deg,${m.color},${m.color}99);"></div>
    </div>
    <div class="card" style="background:${m.color};box-shadow:0 16px 48px ${m.color}88;">
      <div class="float" style="font-size:56px;margin-bottom:8px;">${m.emoji}</div>
      <div class="card-zh">${word.z}</div>
      <div class="card-sub">${word.t}</div>
    </div>
    <button class="speak-btn" id="speakBtn" style="background:${m.bg};color:${m.color};border:2px solid ${m.color}55;">🔊 聽發音</button>
    <div class="boxes" id="boxes"></div>
    <div class="hint">${word.w.length} 個字母</div>
    <div class="stars-hint" id="starsHint">✨ 零失誤可得 ⭐⭐⭐</div>
    <div id="wordDoneMsg"></div>
  `;
  document.getElementById('backBtn').onclick=()=>{mode='menu';buildMenu();};
  document.getElementById('speakBtn').onclick=()=>{
    const btn=document.getElementById('speakBtn');
    btn.classList.add('pulsing');btn.textContent='🔊 播放中...';
    speakWord(word.w);
    setTimeout(()=>{btn.classList.remove('pulsing');btn.innerHTML='🔊 聽發音';},1200);
  };
  buildBoxes();
  setTimeout(()=>focusFirst(),80);
}

function buildBoxes(){
  const boxes=document.getElementById('boxes');
  if(!boxes) return;
  boxes.innerHTML='';
  letterStates.forEach((l,i)=>{
    const inp=document.createElement('input');
    inp.type='text'; inp.maxLength=2; inp.className='letter-box';
    inp.dataset.idx=i;
    if(l.status==='correct'){inp.value=l.char.toUpperCase();inp.readOnly=true;inp.classList.add('correct');}
    else {inp.value='';}
    if(l.status==='shake') inp.classList.add('shake');
    inp.addEventListener('input',e=>handleKey(i,e.target.value));
    inp.addEventListener('click',()=>{
      const first=letterStates.findIndex(x=>x.status!=='correct');
      if(first!==-1&&i!==first) focusBox(first);
    });
    boxes.appendChild(inp);
  });
}

function focusFirst(){ focusBox(letterStates.findIndex(l=>l.status!=='correct')); }
function focusBox(i){
  const boxes=document.querySelectorAll('.letter-box');
  if(boxes[i]) boxes[i].focus();
}

function handleKey(idx,val){
  const typed=val.slice(-1).toLowerCase();
  if(!typed||!/[a-z]/.test(typed)) return;
  const correct=letterStates[idx].char;
  if(typed===correct){
    playSuccess();
    letterStates[idx].status='correct';
    buildBoxes();
    const allDone=letterStates.every(l=>l.status==='correct');
    if(allDone){
      playComplete(); spawnConfetti();
      const stars=mistakes===0?3:mistakes===1?2:1;
      score+=stars;
      const msg=document.getElementById('wordDoneMsg');
      if(msg) msg.innerHTML=`<div class="word-done" style="background:linear-gradient(135deg,${PAGE_META[selPage].color},#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${mistakes===0?'🌟 完美！':'🎉 答對！'} 繼續下一個！</div>`;
      setTimeout(()=>{
        const nextIdx=wordIdx+1;
        if(nextIdx>=wordList.length){ mode='result'; buildResult(); }
        else { wordIdx=nextIdx; mistakes=0; buildSpell(); setTimeout(()=>speakWord(wordList[nextIdx].w),300); }
      },1700);
    } else {
      const next=letterStates.findIndex((l,i)=>i>idx&&l.status!=='correct');
      if(next!==-1) setTimeout(()=>focusBox(next),30);
    }
  } else {
    playError(); mistakes++;
    letterStates[idx].status='shake';
    buildBoxes();
    const hint=document.getElementById('starsHint');
    if(hint) hint.textContent=mistakes===1?'一次錯誤 → ⭐⭐':'兩次以上 → ⭐';
    setTimeout(()=>{
      letterStates[idx].status='empty';
      buildBoxes();
      focusBox(idx);
    },480);
  }
}

// ══ 結果 ══
function buildResult(){
  const m=PAGE_META[selPage];
  const maxScore=wordList.length*3;
  const pct=score/maxScore;
  const trophy=pct>=0.9?'🏆':pct>=0.6?'🥇':'🎮';
  const msg=pct>=1?'🌟 完美無缺！':pct>=0.7?'👏 非常棒！再接再厲！':'💪 繼續練習就會進步！';
  document.getElementById('app').innerHTML=`
    <div style="text-align:center;width:100%;max-width:440px;">
      <div class="float" style="font-size:80px;margin-bottom:12px;">${trophy}</div>
      <h1>關卡完成！</h1>
      <div style="font-size:14px;color:#a0a8c0;margin-bottom:8px;">${m.emoji} P${selPage} · ${m.label}</div>
      <div class="result-box" style="background:${m.bg};border:3px solid ${m.color}44;">
        <div class="result-score" style="color:${m.color};">${score} <span style="font-size:28px;color:#aaa;">/ ${maxScore}</span></div>
        <div style="font-size:16px;color:#888;">⭐ 得分（滿分 ${wordList.length} 字 × 3 星）</div>
        <div style="font-size:18px;font-weight:800;color:${m.color};margin-top:4px;">${msg}</div>
      </div>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
        <button class="nbtn" id="retryBtn" style="background:${m.color};color:#fff;font-size:17px;padding:13px 28px;">🔄 再挑戰一次</button>
        <button class="nbtn" id="menuBtn" style="background:#f0f0ff;color:#6c63ff;font-size:17px;padding:13px 28px;">🏠 選其他關卡</button>
      </div>
    </div>
  `;
  document.getElementById('retryBtn').onclick=()=>startUnit(selPage);
  document.getElementById('menuBtn').onclick=()=>{mode='menu';buildMenu();};
}

// ══ 啟動 ══
buildMenu();
</script>
